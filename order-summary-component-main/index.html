<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0"> <!-- displays site properly based on user's device -->

  <link rel="icon" type="image/png" sizes="32x32" href="./images/favicon-32x32.png">
  <link rel="stylesheet" href="mnk.css">
  <title>Frontend Mentor | Order summary card</title>

  <!-- Feel free to remove these styles or customise in your own stylesheet 👍 -->
  
</head>

<body class="container">

<article class="music">
  <div class="image"><img src="images/illustration-hero.svg" alt="person enjoying music">
  </div>
  <div class="intro"><p>Order Summary</p>
  <p>You can now listen to millions of songs, audiobooks, and podcasts on any 
  device anywhere you like!</p></div>
  <div class="hard">
  <div class="part1">
<img src="images/icon-music.svg" alt="music icon" >
<ul type="none">
  <li class="i1">Annual Plan</li>
  <li class="i2">$59.99/year</li></ul>
    </div>
  <div class="part2"><a href="">Change</a></div>
  </div>
 <button class="pay">Proceed to Payment</button>
<button class="cancel">Cancel Order</button>
</article>
  <footer class="attribution">
    Challenge by <a href="https://www.frontendmentor.io?ref=challenge">Frontend Mentor</a>. 
    Coded by <a href="#">Hanan</a>.
  </footer>
</body>
</html>
